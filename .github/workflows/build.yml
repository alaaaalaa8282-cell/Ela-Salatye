name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias elsalaty \
            -keyalg RSA -keysize 2048 \
            -validity 9125 \
            -keystore elsalaty.jks \
            -storepass elsalaty123 \
            -keypass elsalaty123 \
            -dname "CN=ElSalaty,O=Islamic,C=EG" \
            -noprompt

      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/elsalaty.jks \
            -Pandroid.injected.signing.store.password=elsalaty123 \
            -Pandroid.injected.signing.key.alias=elsalaty \
            -Pandroid.injected.signing.key.password=elsalaty123

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.${{ github.run_number }}"
          name: "إلى صلاتى - إصدار ${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
