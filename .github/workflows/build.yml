name: 🕌 بناء تطبيق محمد عبد العظيم الطويل الاسلامى

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: ☕ تثبيت جافا 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 إصلاح ملف Gradle
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: 🔧 تشغيل gradlew
        run: chmod +x gradlew

      - name: 🏗️ بناء مع إعادة المحاولة
        run: |
          # محاولة أولى
          ./gradlew assembleDebug --no-daemon || \
          # لو فشلت، انتظر 30 ثانية وحاول تاني
          (sleep 30 && ./gradlew assembleDebug --no-daemon --refresh-dependencies) || \
          # لو لسه فشلت، حاول تالت
          (sleep 60 && ./gradlew assembleDebug --no-daemon --refresh-dependencies)

      - name: 📦 حفظ ملف التطبيق
        uses: actions/upload-artifact@v4
        with:
          name: الى-صلاتى-Mohamed-Abdelazim
          path: app/build/outputs/apk/debug/*.apk
